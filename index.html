<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamepad Piano by Tri Wahyu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --primary: #00ffd5;
            --primary-dim: rgba(0, 255, 213, 0.15);
            --accent: #ff0055;
            --bg: #050a08;
            --panel: #0a1411;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #0d261e 0%, var(--bg) 60%);
        }

        /* --- Layar Splash / Loading GitHub --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0a1411 0%, #000 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(10px);
        }

        .profile-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px var(--primary-dim);
        }

        .profile-info h1 {
            margin: 0;
            font-size: 1.8em;
            color: var(--primary);
            letter-spacing: 1px;
        }

        .profile-info p {
            margin: 5px 0 0 0;
            color: #88c2ad;
            font-family: monospace;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            background: rgba(0, 255, 213, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 0 15px var(--primary-dim);
        }

        #start-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px var(--primary);
        }

        #splash-loading {
            display: none;
            width: 300px;
            text-align: center;
        }

        .splash-progress-bg {
            width: 100%;
            height: 6px;
            background: #111;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 15px;
            border: 1px solid #222;
        }

        #splash-progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.1s linear;
        }

        /* --- UI Utama --- */
        .top-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 950px;
            margin-bottom: 20px;
            gap: 15px;
            margin-top: 10px;
        }

        .config-row {
            display: flex;
            width: 100%;
            gap: 15px;
            align-items: stretch;
            flex-wrap: wrap;
        }

        #status {
            flex: 1;
            min-width: 250px;
            padding: 12px;
            background: var(--panel);
            text-align: center;
            border-radius: 4px;
            border: 1px solid #1a332a;
            transition: all 0.3s;
            font-family: monospace;
            font-size: 0.9em;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .connected {
            border-color: var(--primary) !important;
            color: var(--primary);
            box-shadow: 0 0 20px var(--primary-dim);
        }

        .select-wrapper {
            flex: 2;
            min-width: 250px;
            position: relative;
        }

        #instrument-select {
            padding: 12px 10px;
            background: #000;
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 4px;
            font-size: 1em;
            outline: none;
            cursor: pointer;
            width: 100%;
            height: 100%;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 0 10px var(--primary-dim);
        }

        #instrument-select:disabled {
            border-color: var(--accent);
            color: var(--accent);
        }

        .sustain-panel {
            flex: 1;
            min-width: 150px;
            background: var(--panel);
            border: 1px solid #1a332a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        .sustain-panel span {
            font-weight: bold;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #222;
            transition: .3s;
            border-radius: 24px;
            border: 1px solid #444;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: #888;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-dim);
            border-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
            background-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .helper-text {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            color: #4a7768;
            font-size: 0.8em;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #1a332a;
        }

        .helper-text span b {
            color: #88c2ad;
        }

        /* --- Area Mode --- */
        #mode-container {
            width: 100%;
            max-width: 950px;
            position: relative;
            min-height: 380px;
            background: var(--panel);
            border: 1px solid #1a332a;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .mode-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease-out;
            padding: 20px;
            box-sizing: border-box;
        }

        .mode-ui.active {
            display: flex;
            opacity: 1;
            position: relative;
        }

        /* UI Piano Responsif */
        .piano-wrapper {
            display: flex;
            height: 220px;
            border-radius: 4px;
            background: #000;
            padding: 15px;
            gap: 4px;
            border: 1px solid #222;
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            box-sizing: border-box;
            flex-wrap: wrap;
            align-content: flex-start;
        }

        .white-key {
            flex: 1;
            min-width: 30px;
            height: 100px;
            background: linear-gradient(180deg, #dddddd 0%, #ffffff 100%);
            border-radius: 2px 2px 6px 6px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 8px;
            color: #000;
            font-weight: 800;
            transition: transform 0.05s, box-shadow 0.05s;
            position: relative;
            box-shadow: inset 0 -4px 5px rgba(0, 0, 0, 0.2), 0 5px 10px rgba(0, 0, 0, 0.5);
            z-index: 1;
            border: 1px solid #999;
            font-size: 0.75em;
        }

        .white-key.active {
            background: var(--primary);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5), 0 0 20px var(--primary-dim);
            transform: translateY(4px) scale(0.98);
            border-color: var(--primary);
        }

        .white-key.sharp::after {
            content: '♯';
            position: absolute;
            top: 15px;
            font-size: 1.5em;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .white-key.flat::after {
            content: '♭';
            position: absolute;
            top: 15px;
            font-size: 1.5em;
            color: #0066ff;
            text-shadow: 0 0 10px #0066ff;
        }

        .mapping {
            font-size: 0.5em;
            color: #666;
            text-align: center;
            margin-top: 4px;
            font-family: monospace;
        }

        /* UI Radial Responsif */
        .chord-wheels {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            width: 100%;
            justify-content: center;
            margin-bottom: 20px;
        }

        .wheel {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 213, 0.05) 0%, rgba(0, 0, 0, 0.5) 100%);
            border: 1px solid rgba(0, 255, 213, 0.3);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .wheel::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px dashed rgba(0, 255, 213, 0.2);
            transform: scale(0.7);
            pointer-events: none;
        }

        .wheel-center {
            width: 60px;
            height: 60px;
            background: #000;
            border-radius: 50%;
            z-index: 10;
            position: absolute;
            box-shadow: 0 0 20px rgba(0, 0, 0, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            border: 2px solid #1a332a;
            transition: all 0.2s;
        }

        .wheel-center.active {
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px var(--primary-dim);
        }

        .slice-label {
            position: absolute;
            transform-origin: center;
            text-align: center;
            font-weight: bold;
            width: 50px;
            height: 24px;
            color: #3a5c50;
            transition: all 0.15s ease-out;
            z-index: 5;
            font-family: monospace;
            font-size: 1em;
        }

        .slice-label.active {
            color: #fff;
            text-shadow: 0 0 15px var(--primary);
            font-size: 1.3em;
            transform: scale(1.1);
        }

        .analog-dot {
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            z-index: 20;
            box-shadow: 0 0 15px #fff, 0 0 20px var(--primary);
            pointer-events: none;
        }

        .chord-display-area {
            display: flex;
            align-items: center;
            gap: 15px;
            min-height: 50px;
        }

        #active-chord-text {
            font-size: 2.2em;
            color: var(--primary);
            font-weight: 800;
            text-shadow: 0 0 20px var(--primary-dim);
            font-family: system-ui;
            text-align: center;
        }

        #chord-modifier-text {
            font-size: 1.5em;
            color: var(--accent);
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.5);
        }

        /* Media Queries untuk HP */
        @media (max-width: 1024px) {
            .piano-wrapper {
                height: 180px;
            }

            .white-key {
                height: 80px;
                font-size: 0.7em;
            }
        }

        @media (max-width: 768px) {
            .config-row {
                flex-direction: column;
            }

            .wheel {
                width: 220px;
                height: 220px;
            }

            .slice-label {
                font-size: 0.85em;
            }

            .piano-wrapper {
                height: 150px;
            }

            .white-key {
                height: 70px;
                min-width: 25px;
                font-size: 0.65em;
            }
        }

        @media (max-width: 480px) {
            .piano-wrapper {
                height: 120px;
                padding: 8px;
                gap: 2px;
            }

            .white-key {
                height: 60px;
                min-width: 20px;
                font-size: 0.6em;
                padding-bottom: 4px;
            }

            .mapping {
                font-size: 0.4em;
                margin-top: 2px;
            }
        }
    </style>
</head>

<body>

    <div id="splash-screen">
        <div class="profile-container">
            <a href="https://github.com/triwahyu45" target="_blank" rel="noopener noreferrer">
                <img class="profile-pic" src="https://github.com/triwahyu45.png" alt="Profile">
            </a>
            <div class="profile-info">
                <h1>Tri Wahyu</h1>
                <p><a href="https://github.com/triwahyu45" target="_blank" rel="noopener noreferrer"
                        style="color: inherit; text-decoration: none;">github.com/triwahyu45</a></p>
            </div>
        </div>
        <button id="start-btn" type="button">TAP TO START SYSTEM</button>

        <div id="splash-loading">
            <div style="color: var(--primary); letter-spacing: 2px; font-size: 0.9em; margin-bottom: 5px;">MENGUNDUH
                ASSET...</div>
            <div class="splash-progress-bg">
                <div id="splash-progress-bar"></div>
            </div>
        </div>
    </div>

    <div class="top-controls">
        <div class="config-row">
            <div id="status">OS: MENUNGGU PERANGKAT</div>

            <div class="select-wrapper">
                <select id="instrument-select">
                    <optgroup label="Sintesis Analog (Instan - Ringan)">
                        <option value="sine">Pure Sine Wave</option>
                        <option value="triangle">Soft Triangle (Klasik)</option>
                        <option value="square">Square (Retro 8-bit)</option>
                        <option value="sawtooth">Chainsaw (Tajam)</option>
                    </optgroup>
                    <optgroup label="Sintesis Elektronik (Instan)">
                        <option value="fm-epiano">Electric Piano</option>
                        <option value="fm-bell">Crystal Bell</option>
                        <option value="am-pad">Atmospheric Pad</option>
                    </optgroup>
                    <optgroup label="Acoustic Soundbank (Download via 🌐)">
                        <option value="salamander">Salamander Grand Piano ⬇️</option>
                    </optgroup>
                </select>
            </div>

            <div class="sustain-panel">
                <span>SUSTAIN</span>
                <label class="switch">
                    <input type="checkbox" id="sustain-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="helper-text">
            <span><b>[OPTIONS]</b> Ganti Mode</span>
            <span><b>[L-Stick Y]</b> Shift L-Keys</span>
            <span><b>[R-Stick Y]</b> Shift R-Keys</span>
            <span><b>[L1/R1]</b> Modulasi Chord (♭/♯)</span>
        </div>
    </div>

    <div id="mode-container">
        <div id="mode-piano" class="mode-ui active">
            <div class="piano-wrapper">
                <div class="white-key" id="key-A3">A3 <div class="mapping">L2</div>
                </div>
                <div class="white-key" id="key-B3">B3 <div class="mapping">L1</div>
                </div>
                <div class="white-key" id="key-C4">C4 <div class="mapping">D-Down</div>
                </div>
                <div class="white-key" id="key-D4">D4 <div class="mapping">Cross</div>
                </div>
                <div class="white-key" id="key-E4">E4 <div class="mapping">D-Left</div>
                </div>
                <div class="white-key" id="key-F4">F4 <div class="mapping">Square</div>
                </div>
                <div class="white-key" id="key-G4">G4 <div class="mapping">D-Right</div>
                </div>
                <div class="white-key" id="key-A4">A4 <div class="mapping">Circle</div>
                </div>
                <div class="white-key" id="key-B4">B4 <div class="mapping">D-Up</div>
                </div>
                <div class="white-key" id="key-C5">C5 <div class="mapping">Triangle</div>
                </div>
                <div class="white-key" id="key-D5">D5 <div class="mapping">R1</div>
                </div>
                <div class="white-key" id="key-E5">E5 <div class="mapping">R2</div>
                </div>
            </div>
        </div>

        <div id="mode-chord" class="mode-ui">
            <div class="chord-wheels">
                <div class="wheel" id="wheel-left">
                    <div class="wheel-center" id="wc-left">ROOT</div>
                    <div class="analog-dot" id="dot-left"></div>
                </div>
                <div class="wheel" id="wheel-right">
                    <div class="wheel-center" id="wc-right">TYPE</div>
                    <div class="analog-dot" id="dot-right"></div>
                </div>
            </div>
            <div class="chord-display-area">
                <div id="active-chord-text"></div>
                <div id="chord-modifier-text"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Sistem Manajemen Audio ---
        let activeEngine = null;
        let globalReverb = null;
        let softFilter = null;
        let isAudioReady = false;

        const SOUNDBANKS = {
            'salamander': { urls: { A1: "A1.mp3", A2: "A2.mp3", A3: "A3.mp3", A4: "A4.mp3", A5: "A5.mp3", A6: "A6.mp3", A7: "A7.mp3" }, baseUrl: "https://tonejs.github.io/audio/salamander/" },
            'nylon': { urls: { F3: "F3.mp3", F4: "F4.mp3", F5: "F5.mp3" }, baseUrl: "https://tonejs.github.io/audio/casio/" },
            'xylophone': { urls: { C4: "C4.mp3", C5: "C5.mp3", C6: "C6.mp3" }, baseUrl: "https://tonejs.github.io/audio/salamander/" }
        };

        // Menangkap event unduhan
        let loadingBar = document.getElementById('splash-progress-bar');
        if (Tone.Buffer && typeof Tone.Buffer.on === 'function') {
            Tone.Buffer.on("progress", (percent) => {
                if (loadingBar) loadingBar.style.width = `${percent * 100}%`;
            });
        }

        async function switchInstrument(type, isInitial = false) {
            isAudioReady = false;
            const selectEl = document.getElementById('instrument-select');
            selectEl.disabled = true;

            // Jika dipanggil dari dropdown (bukan saat start pertama kali)
            if (!isInitial) {
                loadingBar = document.getElementById('splash-progress-bar');
                document.getElementById('splash-screen').style.display = 'flex';
                document.getElementById('splash-screen').style.opacity = '1';
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('splash-loading').style.display = 'block';
                loadingBar.style.width = '0%';
            }

            if (activeEngine) {
                activeEngine.releaseAll();
                activeEngine.dispose();
            }

            if (!globalReverb) globalReverb = new Tone.Reverb({ decay: 2.5, preDelay: 0.1, wet: 0.3 }).toDestination();
            if (!softFilter) softFilter = new Tone.Filter(1200, "lowpass").connect(globalReverb);

            const isSustain = document.getElementById('sustain-toggle').checked;
            const releaseTime = isSustain ? 2.5 : 0.1;

            if (SOUNDBANKS[type]) {
                activeEngine = new Tone.Sampler({
                    ...SOUNDBANKS[type],
                    release: releaseTime,
                    attack: 0.05
                }).connect(globalReverb);

                await Tone.loaded();
            } else {
                if (type === 'fm-epiano') {
                    activeEngine = new Tone.PolySynth(Tone.FMSynth, {
                        harmonicity: 3, modulationIndex: 10, oscillator: { type: "sine" },
                        envelope: { attack: 0.01, decay: 0.2, sustain: 0.5, release: releaseTime }
                    }).connect(globalReverb);
                } else if (type === 'fm-bell') {
                    activeEngine = new Tone.PolySynth(Tone.FMSynth, {
                        harmonicity: 2.5, modulationIndex: 20,
                        envelope: { attack: 0.01, decay: 0.5, sustain: 0.1, release: releaseTime }
                    }).connect(globalReverb);
                } else if (type === 'am-pad') {
                    activeEngine = new Tone.PolySynth(Tone.AMSynth, {
                        harmonicity: 0.5, oscillator: { type: "triangle" },
                        envelope: { attack: 0.4, decay: 0.2, sustain: 0.8, release: releaseTime }
                    }).connect(globalReverb);
                } else {
                    activeEngine = new Tone.PolySynth(Tone.Synth, {
                        oscillator: { type: type },
                        envelope: { attack: 0.02, decay: 0.1, sustain: 0.8, release: releaseTime },
                        volume: type === 'sawtooth' ? -10 : -2
                    }).connect(softFilter);
                }
                // Delay buatan agar transisi UI terlihat mulus saat memuat instrumen internal
                await new Promise(r => setTimeout(r, 300));
            }

            selectEl.disabled = false;
            isAudioReady = true;

            // Hilangkan overlay
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('splash-screen').style.display = 'none'; }, 500);
        }

        // --- Event Listeners UI ---
        document.getElementById('start-btn').addEventListener('click', async (e) => {
            const btn = e.target;
            btn.disabled = true;
            btn.textContent = 'MENYIAPKAN...';
            document.getElementById('splash-loading').style.display = 'block';

            try {
                // Wajib dipanggil dalam user gesture
                await Tone.start();
                await switchInstrument(document.getElementById('instrument-select').value, true);
                updateGamepadStatus();
            } catch (error) {
                console.error(error);
                btn.disabled = false;
                btn.textContent = 'TAP TO START SYSTEM';
                document.getElementById('status').textContent = `ERROR: ${error.message || 'Gagal memulai audio'}`;
                document.getElementById('splash-loading').style.display = 'none';
            }
        });

        document.getElementById('instrument-select').addEventListener('change', async (e) => {
            await switchInstrument(e.target.value);
        });

        document.getElementById('sustain-toggle').addEventListener('change', (e) => {
            const releaseTime = e.target.checked ? 2.5 : 0.1;
            if (activeEngine) {
                if (activeEngine.name === "Sampler") activeEngine.release = releaseTime;
                else activeEngine.set({ envelope: { release: releaseTime } });
            }
        });

        // --- Logika Kontrol Gamepad ---
        let gamepadIndex = null;
        let previousButtons = [];
        let currentMode = 'piano';

        let activeChordId = null;
        let chordModifier = 0;

        let activeNotes = {};
        let activeChordNotes = [];

        const BUTTON_MAP = {
            6: { id: 'key-A3', note: 'A3', side: 'left' }, 4: { id: 'key-B3', note: 'B3', side: 'left' },
            13: { id: 'key-C4', note: 'C4', side: 'left' }, 0: { id: 'key-D4', note: 'D4', side: 'right' },
            14: { id: 'key-E4', note: 'E4', side: 'left' }, 2: { id: 'key-F4', note: 'F4', side: 'right' },
            15: { id: 'key-G4', note: 'G4', side: 'left' }, 1: { id: 'key-A4', note: 'A4', side: 'right' },
            12: { id: 'key-B4', note: 'B4', side: 'left' }, 3: { id: 'key-C5', note: 'C5', side: 'right' },
            5: { id: 'key-D5', note: 'D5', side: 'right' }, 7: { id: 'key-E5', note: 'E5', side: 'right' }
        };

        const ROOT_NOTES = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
        const CHORD_TYPES = ['maj', 'maj7', '7', 'sus4', 'm', 'm7', 'dim', 'aug'];
        const CHORD_INTERVALS = {
            'maj': [0, 4, 7], 'maj7': [0, 4, 7, 11], '7': [0, 4, 7, 10], 'sus4': [0, 5, 7],
            'm': [0, 3, 7], 'm7': [0, 3, 7, 10], 'dim': [0, 3, 6], 'aug': [0, 4, 8]
        };

        function createWheelLabels(containerId, items) {
            const container = document.getElementById(containerId);
            const angleStep = 360 / items.length;
            items.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = 'slice-label';
                el.id = `label-${containerId}-${item}`;
                el.innerText = item;
                const angleRad = (index * angleStep - 90) * (Math.PI / 180);
                // Radius dipangkas sedikit untuk mode HP agar tidak tumpah
                el.style.left = `calc(50% - 25px + ${Math.cos(angleRad) * 40}%)`;
                el.style.top = `calc(50% - 12px + ${Math.sin(angleRad) * 40}%)`;
                container.appendChild(el);
            });
        }
        createWheelLabels('wheel-left', ROOT_NOTES);
        createWheelLabels('wheel-right', CHORD_TYPES);

        function transposeNote(noteStr, semitoneShift) {
            if (semitoneShift === 0) return noteStr;
            return Tone.Frequency(noteStr).transpose(semitoneShift).toNote();
        }

        function getAngleSegment(x, y, totalSlices) {
            if (Math.hypot(x, y) < 0.45) return null;
            let angle = (Math.atan2(y, x) * 180 / Math.PI) + 90;
            if (angle < 0) angle += 360;
            const sliceSize = 360 / totalSlices;
            return Math.floor(((angle + (sliceSize / 2)) % 360) / sliceSize);
        }

        const worker = new Worker(URL.createObjectURL(new Blob([`
            setInterval(() => postMessage('poll'), 16);
        `], { type: 'application/javascript' })));

        worker.onmessage = function () {
            if (gamepadIndex === null || !isAudioReady || !activeEngine) return;
            const pad = navigator.getGamepads()[gamepadIndex];
            if (!pad) return;

            if (pad.buttons[9].pressed && !(previousButtons[9] || false)) {
                currentMode = currentMode === 'piano' ? 'chord' : 'piano';
                activeEngine.releaseAll();

                activeNotes = {}; activeChordId = null; activeChordNotes = []; chordModifier = 0;
                document.querySelectorAll('.white-key').forEach(el => { el.classList.remove('active', 'sharp', 'flat'); });
                document.getElementById('chord-modifier-text').innerText = '';

                document.getElementById('mode-piano').className = currentMode === 'piano' ? 'mode-ui active' : 'mode-ui';
                document.getElementById('mode-chord').className = currentMode === 'chord' ? 'mode-ui active' : 'mode-ui';
            }

            if (currentMode === 'piano' && pad.axes.length >= 4) {
                const rightMod = pad.axes[1] < -0.6 ? 1 : (pad.axes[1] > 0.6 ? -1 : 0);
                const leftMod = pad.axes[3] < -0.6 ? 1 : (pad.axes[3] > 0.6 ? -1 : 0);

                for (let i = 0; i < pad.buttons.length; i++) {
                    if (!BUTTON_MAP[i]) continue;
                    const btnInfo = BUTTON_MAP[i];
                    const isPressed = pad.buttons[i].pressed;
                    const wasPressed = previousButtons[i] || false;
                    const currentMod = btnInfo.side === 'right' ? rightMod : leftMod;

                    const targetNote = transposeNote(btnInfo.note, currentMod);
                    const domEl = document.getElementById(btnInfo.id);

                    if (isPressed && !wasPressed) {
                        if (activeNotes[i]) activeEngine.triggerRelease(activeNotes[i].note);

                        activeEngine.triggerAttack(targetNote);
                        activeNotes[i] = { note: targetNote, modState: currentMod };

                        if (domEl) {
                            domEl.classList.add('active');
                            if (currentMod === 1) domEl.classList.add('sharp');
                            if (currentMod === -1) domEl.classList.add('flat');
                        }
                    } else if (isPressed && wasPressed && activeNotes[i]) {
                        if (activeNotes[i].modState !== currentMod) {
                            activeEngine.triggerRelease(activeNotes[i].note);
                            activeEngine.triggerAttack(targetNote);
                            activeNotes[i].note = targetNote;
                            activeNotes[i].modState = currentMod;

                            if (domEl) {
                                domEl.classList.remove('sharp', 'flat');
                                if (currentMod === 1) domEl.classList.add('sharp');
                                if (currentMod === -1) domEl.classList.add('flat');
                            }
                        }
                    } else if (!isPressed && wasPressed) {
                        if (activeNotes[i]) {
                            activeEngine.triggerRelease(activeNotes[i].note);
                            delete activeNotes[i];
                        }
                        if (domEl) domEl.classList.remove('active', 'sharp', 'flat');
                    }
                }
            } else if (currentMode === 'chord' && pad.axes.length >= 4) {
                const lx = pad.axes[0], ly = pad.axes[1];
                const rx = pad.axes[2], ry = pad.axes[3];

                const dotL = document.getElementById('dot-left');
                const dotR = document.getElementById('dot-right');

                // Gunakan persen agar responsif dengan ukuran wheel
                if (dotL) dotL.style.transform = `translate(${lx * 40}px, ${ly * 40}px)`;
                if (dotR) dotR.style.transform = `translate(${rx * 40}px, ${ry * 40}px)`;

                const rootIndex = getAngleSegment(lx, ly, 7);
                const typeIndex = getAngleSegment(rx, ry, 8);

                let newModifier = chordModifier;
                if (pad.buttons[5].pressed && !(previousButtons[5] || false)) newModifier = 1;
                if (pad.buttons[4].pressed && !(previousButtons[4] || false)) newModifier = -1;
                if (pad.buttons[14].pressed || pad.buttons[15].pressed) newModifier = 0;

                if (rootIndex !== null && typeIndex !== null) {
                    const root = ROOT_NOTES[rootIndex];
                    const type = CHORD_TYPES[typeIndex];

                    document.getElementById('wc-left').classList.add('active');
                    document.getElementById('wc-right').classList.add('active');

                    const chordId = `${root}-${type}-${newModifier}`;

                    if (activeChordId !== chordId) {
                        if (activeChordNotes.length > 0) activeEngine.triggerRelease(activeChordNotes);

                        activeChordId = chordId;
                        chordModifier = newModifier;

                        document.getElementById('active-chord-text').innerText = `${root}${type}`;

                        const modText = document.getElementById('chord-modifier-text');
                        if (chordModifier === 1) { modText.innerText = '♯'; modText.style.color = 'var(--accent)'; }
                        else if (chordModifier === -1) { modText.innerText = '♭'; modText.style.color = '#0066ff'; }
                        else { modText.innerText = ''; }

                        document.querySelectorAll('.slice-label').forEach(el => el.classList.remove('active'));
                        document.getElementById(`label-wheel-left-${root}`).classList.add('active');
                        document.getElementById(`label-wheel-right-${type}`).classList.add('active');

                        activeChordNotes = [];
                        CHORD_INTERVALS[type].forEach(semitone => {
                            activeChordNotes.push(transposeNote(`${root}4`, semitone + chordModifier));
                        });

                        activeEngine.triggerAttack(activeChordNotes);
                    }
                } else if (rootIndex === null || typeIndex === null) {
                    document.getElementById('wc-left').classList.remove('active');
                    document.getElementById('wc-right').classList.remove('active');

                    if (activeChordId !== null) {
                        if (activeChordNotes.length > 0) {
                            activeEngine.triggerRelease(activeChordNotes);
                            activeChordNotes = [];
                        }
                        activeChordId = null;
                        chordModifier = 0;

                        document.getElementById('active-chord-text').innerText = '';
                        document.getElementById('chord-modifier-text').innerText = '';
                        document.querySelectorAll('.slice-label').forEach(el => el.classList.remove('active'));
                    }
                }
            }

            for (let i = 0; i < pad.buttons.length; i++) {
                previousButtons[i] = pad.buttons[i].pressed;
            }
        };

        function updateGamepadStatus() {
            const statusDiv = document.getElementById("status");
            if (gamepadIndex !== null) {
                statusDiv.textContent = `[ID: ${gamepadIndex}] TERHUBUNG`;
                statusDiv.classList.add("connected");
            } else {
                statusDiv.textContent = `OS: MENUNGGU PERANGKAT`;
                statusDiv.classList.remove("connected");
            }
        }

        window.addEventListener("gamepadconnected", (e) => {
            gamepadIndex = e.gamepad.index;
            if (isAudioReady) updateGamepadStatus();
        });

        window.addEventListener("gamepaddisconnected", (e) => {
            if (e.gamepad.index === gamepadIndex) {
                gamepadIndex = null;
                updateGamepadStatus();
            }
        });
    </script>
</body>

</html>
